{{ $desc := or .Description .Site.Params.description }}
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | The Degree Gap{{ end }}</title>
<meta name="description" content="{{ $desc }}">
<meta name="author" content="Harry Godfrey">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:site_name" content="The Degree Gap">
<meta property="og:locale" content="en_GB">
{{ if not .IsHome }}<meta property="article:author" content="Harry Godfrey">{{ end }}

{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ $desc }}",
  "author": {
    "@type": "Person",
    "name": "Harry Godfrey"
  },
  "publisher": {
    "@type": "Organization",
    "name": "The Degree Gap"
  },
  "mainEntity": {
    "@type": "VideoObject",
    "name": "University Help webinar by Harry Godfrey",
    "description": "Harry Godfrey, co-founder of The Degree Gap, shares practical advice for applying to top UK universities and preparing stronger personal statements.",
    "embedUrl": "https://www.youtube-nocookie.com/embed/GG-UeN156l4",
    "url": "https://youtu.be/GG-UeN156l4"
  }
}
</script>
{{ end }}

<!-- Breadcrumb structured data -->
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    }
    {{ range $i, $a := .Ancestors.Reverse }},
    {
      "@type": "ListItem",
      "position": {{ add $i 2 }},
      "name": "{{ $a.Title }}",
      "item": "{{ $a.Permalink }}"
    }
    {{ end }},
    {
      "@type": "ListItem",
      "position": {{ add (len .Ancestors) 2 }},
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}
